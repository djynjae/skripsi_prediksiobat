<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Apotek MEDILIFE</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Gaya khusus untuk halaman login agar berada tepat di tengah */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--light-blue) 0%, #c4d7f5 100%);
            margin: 0;
        }
        .login-card {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        .login-input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .login-btn:hover {
            background-color: #1e3c96; /* Biru yang lebih gelap saat di-hover */
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div style="font-size: 3rem; color: var(--primary-blue); margin-bottom: 10px;">
            <i class="fas fa-clinic-medical"></i>
        </div>
        <h2 style="margin-top: 0; margin-bottom: 5px; color: var(--text-color);">Apotek Medilife</h2>
        <p style="color: #888; font-size: 0.9rem; margin-bottom: 30px;">Sistem Prediksi Stok Obat</p>
        
        {% if error %}
            <div style="background-color: #ffcccc; color: #cc0000; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem;">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
        {% endif %}
        
        <form action="{{ url_for('views.login') }}" method="POST">
            <div style="text-align: left;">
                <label style="font-weight: 600; font-size: 0.9rem;">Username</label>
                <input type="text" name="username" class="login-input" placeholder="Masukkan username" required>
            </div>
            
            <div style="text-align: left;">
                <label style="font-weight: 600; font-size: 0.9rem;">Password</label>
                <input type="password" name="password" class="login-input" placeholder="Masukkan password" required>
            </div>
            
            <button type="submit" class="login-btn"><i class="fas fa-sign-in-alt"></i> Masuk</button>
        </form>
    </div>

</body>
</html>
