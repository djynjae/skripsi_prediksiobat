<!-- CONTENT -->

<div class="main-content">

```
<div class="glass-card">

    <h1 class="page-title">
        Detail Obat
    </h1>

    <p class="page-subtitle">
        Edit dan lihat detail data obat
    </p>

    <hr>

    <form action="/update_obat/{{ data.id }}"
          method="POST">

        <div class="mb-3">

            <label>Nama Obat</label>

            <input type="text"
                   name="nama_obat"
                   value="{{ data.nama_obat }}"
                   class="form-control">

        </div>

        <div class="mb-3">

            <label>Stok</label>

            <input type="number"
                   name="stok"
                   value="{{ data.stok }}"
                   class="form-control">

        </div>

        <div class="mb-3">

            <label>Tahun</label>

            <input type="number"
                   name="tahun"
                   value="{{ data.tahun }}"
                   class="form-control">

        </div>

        <button class="btn-custom">
            Update Data
        </button>

        <a href="/obat"
           class="btn btn-secondary">

            Kembali

        </a>

    </form>

</div>
```
